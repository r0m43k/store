{{- if .Values.vault.enabled }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: {{ .Release.Namespace }}
data:
  vault.hcl: |
    ui = true
    disable_mlock = true

    storage "file" {
      path = "/vault/data"
    }

    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_disable = 1
    }

    api_addr = "http://vault:8200"

---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: {{ .Release.Namespace }}
spec:
  clusterIP: None

  selector:
    app: vault

  ports:
    - name: http
      port: {{ .Values.vault.containerPort }}
      targetPort: {{ .Values.vault.containerPort }}
      protocol: TCP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: vault
  replicas: 1

  selector:
    matchLabels:
      app: vault

  template:
    metadata:
      labels:
        app: vault

    spec:
      securityContext:
        fsGroup: 1000

      containers:
        - name: vault
          image: {{ .Values.vault.image }}
          imagePullPolicy: IfNotPresent

          command:
            - vault

          args:
            - server
            - -config=/vault/config/vault.hcl

          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          ports:
            - name: http
              containerPort: {{ .Values.vault.containerPort }}
              protocol: TCP

          resources:
{{ toYaml .Values.vault.resources | indent 12 }}

          volumeMounts:
            - name: vault-config
              mountPath: /vault/config/vault.hcl
              subPath: vault.hcl
              readOnly: true

            - name: vault-data
              mountPath: /vault/data

      volumes:
        - name: vault-config
          configMap:
            name: vault-config

  volumeClaimTemplates:
    - metadata:
        name: vault-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.vault.storage }}

{{- end }}