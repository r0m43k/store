apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-init
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded

spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600

  template:
    metadata:
      labels:
        app: mongodb-init

    spec:
      restartPolicy: OnFailure

      containers:
        - name: mongodb-init
          image: {{ .Values.mongodbInit.image }}
          imagePullPolicy: IfNotPresent

          resources:
{{ toYaml .Values.mongodbInit.resources | indent 12 }}

          env:
            - name: MONGO_ROOT_USERNAME
              value: {{ .Values.mongodb.env.MONGO_INITDB_ROOT_USERNAME | quote }}

            - name: MONGO_ROOT_PASSWORD
              value: {{ .Values.mongodb.env.MONGO_INITDB_ROOT_PASSWORD | quote }}

            - name: MONGO_PORT
              value: {{ .Values.mongodb.containerPort | quote }}

          command:
            - sh
            - -c
            - |
              set -eu

              MONGO_URI="mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:${MONGO_PORT}/admin?authSource=admin&serverSelectionTimeoutMS=5000&connectTimeoutMS=5000"

              echo "Waiting for MongoDB..."

              attempt=1

              while true; do
                if output="$(mongosh "$MONGO_URI" \
                  --quiet \
                  --eval 'db.runCommand({ ping: 1 })' 2>&1)"
                then
                  echo "$output"
                  echo "MongoDB is ready"
                  break
                fi

                echo "MongoDB connection attempt ${attempt} failed:"
                echo "$output"

                if [ "$attempt" -ge 60 ]; then
                  echo "MongoDB was not available after 60 attempts"
                  exit 1
                fi

                attempt=$((attempt + 1))
                sleep 5
              done

              echo "Creating reports user..."

              mongosh "$MONGO_URI" --quiet --eval '
                const applicationDb = db.getSiblingDB("sausage-store");

                if (applicationDb.getUser("reports") === null) {
                  applicationDb.createUser({
                    user: "reports",
                    pwd: "reportspassword",
                    roles: [
                      {
                        role: "readWrite",
                        db: "sausage-store"
                      }
                    ]
                  });

                  print("User reports created");
                } else {
                  print("User reports already exists");
                }
              '

              echo "MongoDB initialization completed"