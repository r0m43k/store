name: Sausage Store Deploy

on:
  push:
    branches:
      - main

env:
  HELM_CHART_VERSION: 0.1.${{ github.run_number }}-${{ github.run_attempt }}
  NEXUS_HELM_REPO: ${{ secrets.NEXUS_HELM_REPO }}
  NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
  NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}
  SAUSAGE_STORE_NAMESPACE: ${{ secrets.NAMESPACE }}
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}

jobs:
  # Сборка и пуш образов в докерхаб:
  build_and_push_to_docker_hub:
      name: Push Docker image to DockerHub
      runs-on: ubuntu-latest
      steps:
        - name: Check out the repo
          # Получение исходного кода из репозитория:
          uses: actions/checkout@v3
        - name: Set up Docker Buildx
          # Установка сборщика контейнеров Docker:
          uses: docker/setup-buildx-action@v2
        - name: Login to Docker 
          # Авторизация на Docker Hub:
          uses: docker/login-action@v2
          # При помощи with передаём в action параметры username и password:
          with:
            username: ${{ secrets.DOCKER_USER }}
            password: ${{ secrets.DOCKER_PASSWORD }}
            # Хорошо ли держать логин и пароль прямо в коде workflow?
            # Нет, это нехорошо. Хранить пароль надо в Secrets.
        - name: Push Backend to DockerHub
          # Одновременный билд и пуш образа в Docker Hub:
          uses: docker/build-push-action@v4
          with:
            # Параметр context: ./backend/ указывает, что нужный Dockerfile 
            # находится в ./backend/
            context: ./backend/
            # Параметр push: true указывает, что образ нужно не только собрать,
            # но и отправить на Docker Hub:
            push: true
            # В параметре tags задаётся название и тег для образа.
            # Для каждого пересобранного образа 
            # устанавливаем тег latest, чтобы потом
            # на сервере и в docker-compose.yml не указывать версию образа:
            tags: ${{ secrets.DOCKER_USER }}/sausage-backend:latest
            build-args: |
              VERSION=${{ github.sha }}
        - name: Push Frontend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./frontend/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/sausage-frontend:latest
        - name: Push Backend-report to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./backend-report/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/sausage-backend-report:latest
  # Упаковываем helm-чарт и пушим его в Nexus
  add_helm_chart_to_nexus:
      name: Add Helm Chart To Nexus
      runs-on: ubuntu-latest
      needs: build_and_push_to_docker_hub

      steps:
        - name: Check out the repo
          uses: actions/checkout@v3

        - name: Set up Helm
          uses: azure/setup-helm@v4

        - name: Lint Helm chart
          run: helm lint ./sausage-store-chart

        - name: Package Helm chart
          run: |
            mkdir -p packaged-chart
            helm package ./sausage-store-chart \
              --destination packaged-chart \
              --version "$HELM_CHART_VERSION" \
              --app-version "${{ github.sha }}"

        - name: Upload Helm chart to Nexus
          run: |
            CHART_PACKAGE=$(ls packaged-chart/*.tgz | head -n 1)

            curl --fail --silent --show-error \
              --user "$NEXUS_HELM_REPO_USER:$NEXUS_HELM_REPO_PASSWORD" \
              --upload-file "$CHART_PACKAGE" \
              "${NEXUS_HELM_REPO%/}/"

  # Деплоим приложения в кластер Kubernetes с помощью helm-чарт
  deploy_helm_chart_to_kubernetes:
      name: Deploy Helm Chart To Kubernetes
      runs-on: ubuntu-latest
      needs: add_helm_chart_to_nexus

      steps:
        - name: Set up Helm
          uses: azure/setup-helm@v4

        - name: Set up kubectl
          uses: azure/setup-kubectl@v4
        
        - name: Configure kubeconfig
          run: |
            mkdir -p $HOME/.kube
            echo "$KUBE_CONFIG" > ~/.kube/config
            chmod 600 ~/.kube/config
          
        - name: Add Nexus Helm repository
          run: |
            helm repo add nexus "${NEXUS_HELM_REPO}" \
              --username "$NEXUS_HELM_REPO_USER" \
              --password "$NEXUS_HELM_REPO_PASSWORD" \
              --force-update
                
            helm repo update

        - name: Clean old Helm revisions
          run: |
            kubectl get secrets \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --selector owner=helm,name=sausage-store \
              -o jsonpath='{range .items[*]}{.metadata.creationTimestamp}{" "}{.metadata.name}{"\n"}{end}' \
              | sort \
              | head -n -2 \
              | awk '{print $2}' \
              | xargs -r kubectl delete secret \
                  --namespace "$SAUSAGE_STORE_NAMESPACE"

        - name: Deploy Helm Chart
          run: |
            chart_package="/tmp/sausage-store-${HELM_CHART_VERSION}.tgz"

            curl --fail --silent --show-error \
              --user "$NEXUS_HELM_REPO_USER:$NEXUS_HELM_REPO_PASSWORD" \
              --output "$chart_package" \
              "${NEXUS_HELM_REPO%/}/sausage-store-${HELM_CHART_VERSION}.tgz"
            
            if [ -z "$VAULT_TOKEN" ]; then
              echo "VAULT_TOKEN GitHub secret is empty"
              exit 1
            fi

            helm upgrade --install sausage-store "$chart_package" \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --create-namespace \
              --timeout 10m \
              --disable-openapi-validation \
              --history-max 2 \
              --set backend.replicas=1 \
              --set-string global.vault.vaultToken="$VAULT_TOKEN"

            kubectl rollout status statefulset/mongodb \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --timeout=10m

            kubectl rollout status statefulset/postgresql \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --timeout=10m

            kubectl rollout status statefulset/vault \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --timeout=10m

            kubectl rollout status deployment/sausage-store-backend \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --timeout=10m

            kubectl rollout status deployment/sausage-store-backend-report \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --timeout=10m

            kubectl rollout status deployment/sausage-store-frontend \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --timeout=10m
        
        - name: Show Kubernetes diagnostics
          if: failure()
          run: |
            echo "=== RESOURCES ==="
            kubectl get pods,deployments,statefulsets,jobs,pvc \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              -o wide || true

            echo "=== POD DESCRIPTIONS ==="
            kubectl describe pods \
              --namespace "$SAUSAGE_STORE_NAMESPACE" || true

            echo "=== EVENTS ==="
            kubectl get events \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --sort-by=.lastTimestamp || true

            echo "=== MONGODB INIT LOGS ==="
            kubectl logs \
              --selector app=mongodb-init \
              --all-containers=true \
              --prefix=true \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --tail=-1 || true

            echo "=== MONGODB LOGS ==="
            kubectl logs statefulset/mongodb \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --tail=200 || true

            echo "=== BACKEND LOGS ==="
            kubectl logs deployment/sausage-store-backend \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --previous --tail=200 || true

            echo "=== BACKEND REPORT LOGS ==="
            kubectl logs deployment/sausage-store-backend-report \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --previous --tail=200 || true

            echo "=== VAULT LOGS ==="
            kubectl logs statefulset/vault \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --tail=200 || true